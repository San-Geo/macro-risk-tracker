# =====================================================================
# Global Macro Risk Tracker - scoring backbone
# ---------------------------------------------------------------------
# HOW SCORING WORKS (plain version):
#   Each story has a human-set base_level (1-10), the analyst anchor.
#   Each indicator is classified into a band: 0 = benign, 1 = watch, 2 = stress,
#   using its `direction` and the `good`/`warn` thresholds.
#   delta        = weight * (current_band - baseline_band) / 2
#   story level  = clamp( base_level + sum(deltas), 1, 10 )
#   So live data nudges the analyst anchor up or down, and every move is auditable.
#
#   direction: "higher_worse"  -> band 0 if value <= good, 1 if <= warn, else 2
#              "lower_worse"   -> band 0 if value >= good, 1 if >= warn, else 2
#   source:    "fred:CODE"            keyless CSV from FRED
#              "fred_spread:A:B"      (series A - series B), in the series' native unit
#              "market:SYMBOL"        Yahoo chart API (e.g. ^MOVE, JPY=X, GC=F)
#              "manual"               read from manual_input.csv (judgement / slow data)
#   Tune thresholds to taste - they are sensible starting points, not gospel.
# =====================================================================

meta:
  title: "Global Macro Risk Tracker"
  as_of: "2026-06-25"
  bands: { low: "1-2", moderate: "3-4", elevated: "5-6", high: "7-8", severe: "9-10" }

