# Mainstream context dials - DISPLAY ONLY. These famous gauges are shown on the
# dashboard for contrast and completeness; they NEVER feed the score. That is the
# point: when these read calm while the structural gauge reads elevated (or vice
# versa), the divergence itself is the information. All keyless FRED series.

intro: >
  The famous dials, for contrast. These are the most-watched macro gauges in the world -
  shown here so you can compare them with this tracker's structural lens. They are not
  part of the score. When they disagree with the gauge above, that divergence is the
  story: markets price these continuously, while the risks this tracker follows are the
  kind markets historically ignored until they ruptured.

dials:
  - id: vix
    label: VIX
    source: "fred:VIXCLS"
    note: "Expected US stock-market volatility - the most-watched fear gauge. Calm markets usually sit below ~20."
  - id: curve
    label: 10y-2y curve
    source: "fred:T10Y2Y"
    unit: "pp"
    note: "10-year minus 2-year Treasury yield. A negative (inverted) reading has historically preceded US recessions - with long and variable lags."
  - id: hy_oas
    label: High-yield spread
    source: "fred:BAMLH0A0HYM2"
    unit: "pp"
    note: "The extra yield markets demand to lend to risky companies - the market's own price of credit stress. Calm is roughly below ~4."
  - id: nfci
    label: Chicago Fed NFCI
    source: "fred:NFCI"
    note: "The Chicago Fed's broad financial-conditions index across money, debt, and equity markets. Negative = looser (calmer) than average."
  - id: unrate
    label: Unemployment
    source: "fred:UNRATE"
    unit: "%"
    note: "The US unemployment rate - the classic real-economy dial, updated monthly."
