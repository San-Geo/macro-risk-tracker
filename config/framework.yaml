# Agent rating framework: one rubric per judgment indicator.
# type: band (0/1/2 vs a fact-anchored rubric) or value (report the latest number; min/max = sanity range).
# sources/authorities: preferred primary sources; the indicator's set also adds domain authorities (config/domains.yaml).
# NOTE: jgb30, peg_deviation, stablecoin_supply moved to DIRECT FEEDS (MOF / DefiLlama) - no longer agent-rated.
indicators:
  clearing_status:
    type: band
    query: SEC US Treasury central clearing mandate 2026 2027 timeline status delay
    rubric: '0 = ON TRACK: SEC compliance dates unchanged (cash 2026-12-31, repo 2027-06-30), no new extension
      sought. 1 = SLIPPING: an official extension granted, OR exemptive-relief requests pending, OR readiness
      surveys show <60% of firms confident of meeting the deadline. 2 = DELAYED: a SECOND formal deadline
      extension announced, or a deadline passed without compliance. Cite the SEC order or an industry
      readiness survey.'
    sources:
    - https://www.sec.gov
    - https://www.dtcc.com
    - https://www.risk.net
  plan_financing:
    type: band
    query: Japan Takaichi fiscal stimulus plan financing JGB issuance market reaction
    rubric: 'Judge by the JGB market''s reaction to the fiscal plan. 0 = OK: 10y JGB yield stable and
      supplementary budget specifies funding, auctions well covered (bid-to-cover >3). 1 = UNCLEAR: funding
      path unspecified OR 10y JGB yield up >25bps on fiscal news but auctions still clearing. 2 = DISORDERLY:
      a failed/tailing JGB auction (bid-to-cover <2 or a long tail), an emergency BOJ operation, or a
      >50bps yield spike on fiscal concern. Cite the auction result or yield move.'
    sources:
    - https://www.reuters.com/markets/asia
    - https://www.bloomberg.com/markets
  direct_lending_default:
    type: value
    min: 0
    max: 25
    query: private credit direct lending default rate latest 2026 percent
    rubric: Report the latest direct-lending / private-credit default rate as a percent (e.g. 3.0).
    sources:
    - https://www.imf.org/en/Publications/GFSR
    - https://pitchbook.com
    - https://www.ft.com
  redemption_gates:
    type: band
    query: private credit fund redemption gates limits 2026
    rubric: 'COUNT named private-credit/BDC funds with redemption gates or quarterly repurchase caps active
      in the same quarter. 0 = NONE. 1 = ISOLATED: 1-2 funds gating. 2 = WIDESPREAD: >=3 of the largest
      funds, or gated funds with combined AUM > $100bn. Name the funds and the quarter.'
    sources:
    - https://www.ft.com
    - https://www.bloomberg.com
  new_imf_programs:
    type: band
    query: IMF new program emerging market default missed coupon 2026
    rubric: 'COUNT sovereign-distress events in the trailing 6 months. 0 = CALM: no new IMF programs or
      missed coupons. 1 = RISING: 1-2 new IMF arrangements, OR a single sovereign missed coupon/standstill.
      2 = CLUSTER: >=3 sovereigns newly in IMF programs or in default/missed-coupon in the window. List
      the countries.'
    sources:
    - https://www.imf.org/en/News
    - https://www.worldbank.org
  china_ppi:
    type: value
    min: -15
    max: 15
    query: China PPI producer price index year-on-year latest percent NBS
    rubric: 'Report China PPI year-on-year as a SIGNED percent EXACTLY as published by the National Bureau
      of Statistics (NBS), keeping the sign. This indicator is TWO-SIDED: a large move in EITHER direction
      is a price-spillover shock - deep deflation (very negative) exports disinflation, sharp cost-push
      inflation (very positive) exports input-cost pressure. Just report the signed number and the release
      month; the engine scores it on the SIZE of the move, not the sign. State the figure, the month,
      and the NBS release date. If you cannot confirm a clearly signed official figure, return low confidence
      so the prior is held.'
    authorities:
    - https://www.stats.gov.cn/english/
    - https://tradingeconomics.com/china/producer-prices-change
    sources:
    - https://www.stats.gov.cn/english/
    - https://tradingeconomics.com/china/producer-prices-change
  trade_actions:
    type: band
    query: new tariffs anti-dumping China export trade measures latest 2026
    rubric: 'COUNT new major-economy trade measures (tariffs, anti-dumping, export bans) in the trailing
      3 months. 0 = CALM: none. 1 = RISING: 1-3 new measures but within a managed truce. 2 = ESCALATING:
      >=4 new measures, OR a broad tariff round (>=10% across a sector), OR an explicit truce breakdown.
      List the measures.'
    sources:
    - https://www.reuters.com/business
    - https://www.wto.org
  license_flow:
    type: band
    query: China rare earth magnet export licenses approvals status 2026
    rubric: 'Judge China''s rare-earth export licensing regime by APPROVAL BREADTH and PROCESSING TIME
      per MOFCOM announcements and credible trade reporting. 0 = FLOWING: general/blanket licences cover
      most export volume AND typical approvals <30 days, no new categories restricted in the trailing
      3 months. 1 = SLOWING: case-by-case or whitelist licensing (approvals limited to named producers/end-users),
      OR typical processing >30 days, OR a new category added to the control list in the trailing 3 months.
      2 = FROZEN: categorical denials to a country/sector, OR no new licences issued for >30 days, OR
      an announced suspension of export licensing.'
    sources:
    - https://www.reuters.com/markets/commodities
    - https://www.csis.org
  truce_status:
    type: band
    query: US China rare earth trade truce November 2025 status extended expired
    rubric: 'Track the specific Nov-2025 US-China minerals truce (nominal expiry 2026-11-10). 0 = EXTENDED/holding:
      in force, no breach. 1 = EXPIRING/fraying: <90 days to expiry with no renewal, OR a partial breach
      (e.g. new entity-list additions). 2 = LAPSED: truce expired or formally abandoned / controls reimposed.'
    sources:
    - https://www.reuters.com
    - https://www.csis.org
  re_blacklist:
    type: band
    query: China MOFCOM export control entity list US rare earth producers MP Materials USA Rare Earth
    rubric: 'Count the FACT, do not interpret severity. 0 = NO US domestic rare-earth producer is on China''s
      MOFCOM export-control / entity list. 1 = ENTITY-SPECIFIC: one or more named US producers are listed
      (e.g. MP Materials, USA Rare Earth) but the restriction is firm-specific. 2 = SECTOR-WIDE: the listing
      is broadened to a categorical ban covering the US rare-earth sector or all dual-use transfers to
      US producers as a class. State which firms are listed and the listing date.'
    authorities:
    - https://www.mofcom.gov.cn
    - https://www.federalregister.gov
    - https://www.reuters.com
    - https://www.csis.org
    sources:
    - https://www.mofcom.gov.cn
    - https://www.reuters.com
    - https://www.csis.org
  hree_premium:
    type: value
    min: 1
    max: 25
    query: heavy rare earth ex-China price premium multiple 2026
    rubric: Report the approximate ex-China heavy-rare-earth price premium as a multiple of the China
      price (e.g. 3.0).
    sources:
    - https://www.fastmarkets.com
    - https://adamasintel.com
  genius_impl:
    type: band
    query: GENIUS Act stablecoin regulation implementation 2026 status issues
    rubric: 'Track GENIUS Act stablecoin rulemaking vs the statutory 2026-07-18 deadline. 0 = SMOOTH:
      final rules issued on schedule, no major agency divergence. 1 = GAPS: rules still in proposed/comment
      stage near the deadline, OR documented inter-agency divergence (e.g. OCC vs FDIC). 2 = PROBLEMS:
      deadline missed without final rules, a court stay, or a compliance-failure event. Cite the rule
      status.'
    sources:
    - https://www.sec.gov
    - https://www.federalreserve.gov
    - https://www.coindesk.com/policy
  ai_revenue_gap:
    type: band
    query: AI capex versus revenue gap monetization concern 2026 hyperscaler
    rubric: 'Compare hyperscaler AI capex growth vs AI-attributable revenue growth for the latest reported
      quarter. 0 = CLOSING: AI-revenue growth >= capex growth. 1 = WIDE: capex growth exceeds AI-revenue
      growth but AI revenue is still accelerating YoY. 2 = WIDENING FAST: capex growth outpaces AND AI-revenue
      growth decelerates QoQ, or a hyperscaler raises capex while cutting its AI-revenue outlook. Cite
      the capex and AI-revenue figures.'
    sources:
    - https://www.theinformation.com
    - https://www.ft.com
    - https://www.sequoiacap.com
  gpu_refi_stress:
    type: band
    query: GPU-backed debt data center financing refinancing stress 2026
    rubric: '0 = NONE: GPU/data-center-backed debt refinancing normally. 1 = SIGNS: banks offloading AI/data-center
      debt at a discount, a named borrower facing a refinancing wall, or a rating watch on GPU-backed
      paper. 2 = ACUTE: a confirmed default, distressed exchange, or failed refinancing of GPU-backed
      debt. Name the issuer.'
    sources:
    - https://www.ft.com
    - https://www.bloomberg.com
    - https://www.moodys.com
  cmbs_office_delinq:
    type: value
    min: 0
    max: 40
    query: CMBS office delinquency rate latest percent Trepp 2026
    rubric: Report the latest CMBS office delinquency rate as a percent (e.g. 12.3).
    sources:
    - https://www.trepp.com/trepptalk
    - https://www.commercialsearch.com
  regional_bank_stress:
    type: band
    query: regional bank commercial real estate stress failures 2026
    rubric: 'Count US bank failures on the FDIC failed-bank list in the trailing 6 months where FDIC/Fed/OCC
      materials or credible reporting cite CRE/real-estate exposure as a contributing factor. 0 = CALM:
      zero such failures AND no new public enforcement action or supervisory statement citing regional-bank
      CRE concentration in the trailing 6 months. 1 = ISOLATED: 1-2 such failures (each <$10bn assets),
      OR >=1 new public enforcement action/consent order citing CRE concentration. 2 = CLUSTER: >=3 such
      failures in 6 months, OR any single CRE-linked failure >$10bn assets, OR a coordinated supervisory
      action (e.g. interagency statement, emergency facility) aimed at regional-bank CRE stress.'
    sources:
    - https://www.fdic.gov
    - https://www.federalreserve.gov
    - https://www.spglobal.com
  govt_stability:
    type: band
    query: France government stability budget no-confidence snap election latest
    rubric: '0 = STABLE: government holds a working majority. 1 = FRAGILE: minority/hung parliament relying
      on Article 49.3 or surviving no-confidence votes, but governing. 2 = COLLAPSE: government fell on
      a confidence vote, PM resigned, or a snap election/dissolution was called. State the latest vote/event
      and date.'
    sources:
    - https://www.lemonde.fr/en/
    - https://www.reuters.com/world/europe
  rating_action:
    type: band
    query: France sovereign credit rating outlook S&P Moody's Fitch latest
    rubric: 'Use the most recent action from S&P/Moody''s/Fitch. 0 = STABLE: all stable outlooks, no recent
      cut. 1 = NEGATIVE OUTLOOK: at least one agency on negative outlook/watch. 2 = DOWNGRADE: an actual
      rating cut in the trailing 12 months. Cite the agency, date, and rating.'
    sources:
    - https://www.spglobal.com/ratings
    - https://www.fitchratings.com
    - https://www.moodys.com
  subprime_auto_dpd:
    type: value
    min: 0
    max: 25
    query: subprime auto loan 60+ day delinquency rate latest percent 2026
    rubric: Report the latest subprime auto 60+ day delinquency rate as a percent (e.g. 6.2).
    sources:
    - https://www.fitchratings.com
    - https://www.coxautoinc.com/market-insights/
  bnpl_delinq:
    type: band
    query: buy now pay later BNPL delinquency trend 2026 Affirm Klarna
    rubric: 'Use a reported BNPL delinquency series (Affirm 30+ DPD, LendingTree survey, Fed brief). 0
      = STABLE: delinquency flat or down YoY. 1 = RISING: late-payment/delinquency up YoY but provider
      charge-offs contained (<3%). 2 = SPIKING: a named provider''s 30+ DPD up >100bps YoY, or charge-offs
      >5%. Cite the figure.'
    sources:
    - https://www.richmondfed.org
    - https://www.cfpb.gov
    - https://www.ft.com
  dollar_reserve_share:
    type: value
    min: 30
    max: 80
    query: US dollar share global FX reserves IMF COFER latest percent
    rubric: Report the latest USD share of allocated global FX reserves as a percent (e.g. 56.8).
    sources:
    - https://data.imf.org/cofer
    - https://www.imf.org
  weaponization_event:
    type: band
    query: reserve weaponization sanctions asset freeze non-dollar settlement latest 2026
    rubric: '0 = NONE: no new reserve freeze or settlement-system shift. 1 = TALK: new non-dollar settlement
      agreements/launches (BRICS Pay, gold-unit) or official rhetoric, but no new sovereign reserve seizure.
      2 = ACTION: a new sovereign reserve freeze/seizure, OR a major economy operationally moving reserve
      settlement off USD. Name the event.'
    sources:
    - https://www.reuters.com
    - https://www.atlanticcouncil.org
  insurer_exits:
    type: band
    query: home insurer non-renewals market exits states 2026
    rubric: 'COUNT US states with active insurer market exits or non-renewal waves. 0 = STABLE: isolated,
      <5 states, stable outlook. 1 = RISING: elevated across 5-15 states but some markets stabilizing.
      2 = ACCELERATING: >15 states, OR a top-10 insurer fully exiting a major state market. Cite state
      DOI / AM Best.'
    sources:
    - https://www.naic.org
    - https://www.insurancejournal.com
  cat_losses:
    type: band
    query: insured catastrophe losses severe season 2026 hurricane wildfire
    rubric: 'Use YTD insured-catastrophe-loss totals vs the 10-year average (Gallagher Re/Aon/Swiss Re).
      0 = NORMAL: YTD <= 10y average and no single event >$10bn. 1 = ELEVATED: YTD above the 10y average,
      OR one event >$10bn. 2 = SEVERE SEASON: YTD >150% of average, OR a single event >$30bn. Cite the
      figure and source.'
    sources:
    - https://www.aon.com/reinsurance
    - https://www.munichre.com
    - https://www.swissre.com/institute/
  ss_reform_news:
    type: band
    query: US Social Security trust fund reform benefit cut pension news 2026
    rubric: 'Track US Social Security/pension legislative status. 0 = NONE: no change to trust-fund outlook
      or reform activity. 1 = DEBATE: trustees report worsens the depletion date or reform actively debated,
      but no enacted cuts. 2 = CUTS: an automatic benefit reduction triggered, or legislation enacting
      cuts. Cite the trustees report or bill.'
    sources:
    - https://www.ssa.gov/oact/
    - https://www.crfb.org
  pension_leverage_event:
    type: band
    query: pension fund leverage LDI margin crisis 2026
    rubric: '0 = NONE: LDI buffers adequate, no margin stress (cite TPR/ESMA). 1 = STRESS: a regulator
      flags LDI/pension liquidity risk, or a margin-call episode without forced selling. 2 = BLOWUP: forced
      gilt/bond selling by pension/LDI funds, or a central-bank intervention to halt it. State the episode.'
    sources:
    - https://www.bankofengland.co.uk
    - https://www.ft.com
    - https://www.pionline.com
  funded_ratio:
    type: value
    min: 30
    max: 130
    query: large US public pension funded ratio latest percent 2026
    rubric: Report a representative large US public-pension funded ratio as a percent (e.g. 78).
    sources:
    - https://www.milliman.com
    - https://equable.org
  interconnection_months:
    type: value
    min: 0
    max: 180
    query: US grid interconnection queue wait time median months latest LBNL
    rubric: Report the latest median grid interconnection wait in months (e.g. 54).
    sources:
    - https://emp.lbl.gov/queues
    - https://www.ferc.gov
  dc_moratoria:
    type: band
    query: data center moratorium ban state legislation electricity backlash 2026
    rubric: 'COUNT jurisdictions with enacted data-center moratoria or construction pauses. 0 = NONE.
      1 = SPREADING: bills introduced or local pauses in 1-10 jurisdictions. 2 = WIDESPREAD: a statewide
      moratorium enacted, OR >10 jurisdictions with enacted pauses/cancellations. List the jurisdictions.'
    sources:
    - https://www.utilitydive.com
    - https://www.datacenterdynamics.com
  ai_power_pressure:
    type: band
    query: data center power demand growth grid shortfall vs slowdown 2026
    rubric: 'Use grid-operator/IEA evidence on data-center power. 0 = EASING: interconnection queues shortening,
      no curtailment. 1 = TIGHT: queues long and lengthening, projects delayed for power, but no forced
      curtailment. 2 = ACUTE: confirmed curtailment of data-center load, a declared grid emergency, or
      a power-scarcity-driven moratorium. Cite IEA/grid operator.'
    sources:
    - https://www.iea.org
    - https://www.woodmac.com
    - https://www.spglobal.com/commodityinsights
  mine_disruptions:
    type: band
    query: major copper mine disruption outage strike 2026 Grasberg Kamoa
    rubric: 'COUNT top-20-by-output copper mines with confirmed production cuts/outages currently active.
      0 = NONE. 1 = SOME: 1-2 mines with reduced output. 2 = CLUSTER: >=3 major mines disrupted, OR lost
      output large enough that institutions forecast a market deficit. Name the mines.'
    sources:
    - https://www.mining.com
    - https://www.reuters.com/markets/commodities
  copper_deficit_timing:
    type: band
    query: copper market balance surplus deficit ICSG forecast 2026
    rubric: 'Use the latest ICSG (or MS/JPM/ING consensus) refined-copper balance forecast for the current
      year. 0 = SURPLUS: official forecast a surplus. 1 = BALANCED: forecast within +/-100kt of balance.
      2 = DEFICIT: forecast a refined deficit. Cite the ICSG forecast and number.'
    sources:
    - https://icsg.org
    - https://www.spglobal.com/commodityinsights
  drought_chip_farm:
    type: band
    query: drought Taiwan US Southwest major farming region chip fab water 2026
    rubric: 'Use a drought monitor for a named chip/agri hub (US Southwest, Taiwan). 0 = NONE: normal
      precipitation/snowpack. 1 = EMERGING: ''severe'' (D2) drought OR snowpack 20-50% below normal, no
      production impact yet. 2 = ACUTE: ''extreme/exceptional'' (D3-D4) OR a confirmed production curtailment
      / water-rationing order at a fab or farm region. Cite the monitor.'
    sources:
    - https://droughtmonitor.unl.edu
    - https://www.reuters.com
    - https://www.wri.org
  reservoir_stress:
    type: band
    query: Lake Mead Colorado River reservoir levels key basins latest 2026
    rubric: 'Track a key reservoir (e.g. Lake Mead) level vs its critical threshold. 0 = NORMAL: storage
      >50% of capacity. 1 = LOW: 30-50% of capacity, or below the date-average. 2 = CRITICAL: <30% of
      capacity, OR within 15 feet of a power-generation/dead-pool threshold. Cite the USBR level.'
    sources:
    - https://www.usbr.gov/lc/region/g4000/hourly/levels.html
    - https://water.weather.gov
  water_dispute:
    type: band
    query: transboundary water dispute Nile GERD Indus escalation 2026
    rubric: 'Track named transboundary disputes (Indus, Nile/GERD, etc.). 0 = CALM: treaties functioning.
      1 = TENSE: a treaty suspended/contested or official threats exchanged, no kinetic action. 2 = CRISIS:
      an armed clash, a deliberate flow cut-off carried out, or a war threat tied to a dam/river. State
      the dispute and latest action.'
    sources:
    - https://www.aljazeera.com
    - https://www.reuters.com/world
  fao_food_trend:
    type: band
    query: FAO Food Price Index latest direction rising falling 2026
    rubric: 'Use the FAO Food Price Index (monthly). 0 = FALLING: index down MoM and YoY. 1 = ELEVATED:
      index rising or at a multi-year high but MoM change <3%. 2 = SPIKING: MoM increase >=5%, or a 3-month
      rise >=10%. Cite the index value and month.'
    sources:
    - https://www.fao.org/worldfoodsituation/foodpricesindex
    - https://www.fao.org
  china_export_curbs:
    type: band
    query: China fertilizer export restrictions urea phosphate quota status 2026
    rubric: '0 = LIFTED: no active Chinese fertilizer export restrictions. 1 = IN PLACE: existing quotas/suspensions
      continue unchanged (e.g. phosphate suspension, urea quota). 2 = TIGHTENED: a NEW or broadened restriction
      in the trailing 3 months (added product, lower quota, longer suspension). Cite NDRC/customs and
      the specific measure.'
    sources:
    - https://www.foodsecurityportal.org
    - https://blogs.worldbank.org
  hormuz_fertilizer:
    type: band
    query: Strait of Hormuz sulfur ammonia fertilizer shipping disruption 2026
    rubric: 'Rate Gulf fertilizer/sulfur/ammonia INPUT flow through the same Strait of Hormuz that hormuz_redsea_status
      tracks - the two MUST agree on whether the strait is open/contested/closed. 0 = inputs flowing ~normally.
      1 = DISRUPTED: flows reduced, costs/insurance elevated, but moving (including under naval-escorted
      convoys or a partial reopening / ceasefire / MOU). 2 = CUT: input transit effectively halted by
      a genuine closure - apply ONLY if the strait is rated CLOSED (2) and a market signal corroborates
      it (crude oil elevated). Convoys moving, a signed truce, or benign oil CAP this at 1, even if volumes
      are far below normal.'
    sources:
    - https://www.fao.org
    - https://blogs.worldbank.org
    - https://www.reuters.com/markets/commodities
  taiwan_tension:
    type: band
    query: Taiwan Strait China military tension drills incidents latest 2026
    rubric: '0 = CALM: routine activity. 1 = ELEVATED: large-scale PLA drills, blockade rehearsals, or
      assertive patrols, but no kinetic clash or blockade. 2 = CRISIS: an actual blockade, a kinetic clash,
      or full mobilization. State the latest military event and date.'
    sources:
    - https://www.reuters.com/world/asia-pacific
    - https://www.csis.org/programs/china-power-project
  export_controls:
    type: band
    query: semiconductor export controls ASML China escalation retaliation 2026
    rubric: 'COUNT active semiconductor export-control escalations (trailing 3 months). 0 = STABLE: no
      new measures. 1 = TIGHTENING: new US/allied controls OR new entity-list additions. 2 = RETALIATION:
      the target country enacts countermeasures (counter-controls, legal retaliation, equipment bans).
      List the measures on each side.'
    sources:
    - https://www.bis.doc.gov
    - https://www.csis.org
    - https://www.reuters.com/technology
  fab_concentration:
    type: band
    query: advanced chip fab geographic diversification Taiwan TSMC US Japan 2026
    rubric: 'Measure the share of leading-edge (<=3nm) capacity outside Taiwan. 0 = EASING: >25% outside
      Taiwan and rising. 1 = HIGH: 10-25% outside Taiwan; diversification underway but Taiwan dominant.
      2 = EXTREME: <10% outside Taiwan AND no operational overseas leading-edge fab. Cite capacity figures.'
    sources:
    - https://www.tsmc.com
    - https://www.semiconductors.org
    - https://www.reuters.com/technology
  hormuz_redsea_status:
    type: band
    query: Strait of Hormuz Red Sea shipping status open closed ceasefire latest 2026
    rubric: 'Rate Strait of Hormuz / Red Sea transit. 0 = open, traffic ~normal. 1 = CONTESTED: threatened,
      partially disrupted, moving under naval-escorted convoys, OR a ceasefire / MOU / active de-escalation
      in effect even if volumes are reduced. 2 = CLOSED: commercial transit physically/legally halted
      at well under ~25% of normal with NO functioning convoy workaround. Apply 2 ONLY if a corroborating
      market signal is consistent with a closure (notably crude oil elevated); if oil is benign, treat
      it as contested (1), not closed. Convoys moving, talks underway, or a signed truce CAP this at 1.'
    sources:
    - https://www.reuters.com/world/middle-east
    - https://www.imo.org
    - https://www.cfr.org
  cable_incidents:
    type: band
    query: undersea submarine cable damage cut Red Sea Hormuz Baltic latest 2026
    rubric: '0 = NONE: no recent damage to major submarine cables. 1 = THREATENED: credible threats, anchor-dragging
      incidents, or a single repaired cut. 2 = CUT: >=1 major cable currently severed and unrepaired causing
      connectivity loss, or multiple simultaneous cuts. Name the cable(s) and date.'
    sources:
    - https://www.submarinecablemap.com
    - https://www.reuters.com/technology
    - https://www.lloydslist.com
  treasury_clearing_rollout:
    type: band
    query: US Treasury central clearing implementation capacity readiness 2026 2027
    rubric: 'Track UST central-clearing readiness vs deadlines (cash 2026-12-31, repo 2027-06-30). 0 =
      SMOOTH: on track, broad readiness. 1 = FRICTION: documentation backlog, pending exemptive relief,
      or readiness surveys <60% confident. 2 = PROBLEMS: a deadline extension, a major participant unable
      to comply, or an operational failure in testing. Cite TBAC/SEC/industry survey.'
    sources:
    - https://www.sec.gov
    - https://www.dtcc.com
    - https://www.risk.net
