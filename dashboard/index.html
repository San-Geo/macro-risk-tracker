<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Global Macro Risk Tracker</title>
<style>
  :root{ --blue:#1F4E79; --grey:#595959; --line:#e3e3e3; }
  *{ box-sizing:border-box; }
  body{ font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; margin:0;
        color:#1a1a1a; background:#f7f8fa; }
  header{ background:var(--blue); color:#fff; padding:22px 20px; }
  header h1{ margin:0; font-size:20px; }
  header .sub{ opacity:.85; font-size:13px; margin-top:4px; }
  .wrap{ max-width:1000px; margin:0 auto; padding:20px; }
  .agg{ display:flex; gap:14px; flex-wrap:wrap; margin:16px 0 8px; }
  .agg .card{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px 18px; flex:1; min-width:150px; }
  .agg .num{ font-size:30px; font-weight:700; }
  .agg .lbl{ color:var(--grey); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .narr{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin:14px 0; white-space:pre-wrap; line-height:1.5; font-size:14px; }
  .story{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin:12px 0; }
  .story h3{ margin:0 0 6px; font-size:15px; }
  .row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .meter{ display:flex; gap:3px; flex:1; min-width:220px; }
  .seg{ height:16px; flex:1; border-radius:3px; background:#e2e2e2; }
  .lvl{ font-weight:700; font-size:15px; white-space:nowrap; }
  .band{ font-size:12px; color:var(--grey); }
  table{ border-collapse:collapse; width:100%; margin-top:10px; font-size:12.5px; }
  th,td{ text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  th{ color:var(--grey); font-weight:600; }
  .pill{ display:inline-block; padding:1px 7px; border-radius:10px; color:#fff; font-size:11px; font-weight:600; }
  .stale{ color:#999; font-style:italic; }
  footer{ color:var(--grey); font-size:12px; text-align:center; padding:24px; }
  .err{ background:#fde8e8; border:1px solid #f5b5b5; padding:14px; border-radius:8px; }
  .panel{ background:#fff; border:1px solid var(--line); border-radius:10px; margin:14px 0; overflow:hidden; }
  .phead{ padding:14px 18px; cursor:pointer; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; align-items:center; }
  .phead:hover{ background:#fafbfc; }
  .pbody{ display:none; padding:0 18px 16px; }
  .panel.open .pbody{ display:block; }
  .phead .chev::after{ content:"\25BC"; font-size:11px; color:var(--grey); }
  .panel.open .phead .chev::after{ content:"\25B2"; }
  details summary{ cursor:pointer; }
  a{ color:var(--blue); }
  .health{ display:flex; gap:16px; flex-wrap:wrap; align-items:center; background:#fff; border:1px solid var(--line);
           border-radius:10px; padding:10px 16px; margin:12px 0; font-size:12.5px; color:var(--grey); }
  .health .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle; }
  .health b{ color:#1a1a1a; }
  .trend{ font-size:12.5px; font-weight:700; white-space:nowrap; }
  .spark{ display:block; }
  .asof{ color:#9a9a9a; white-space:nowrap; }
  .prov{ display:inline-block; font-size:10px; color:#fff; background:#9aa; border-radius:4px; padding:0 5px; margin-left:4px; vertical-align:middle; }
</style>
</head>
<body>
<header>
  <h1>Global Macro Risk Tracker</h1>
  <div class="sub" id="sub">loading...</div>
</header>
<div class="wrap" id="app">Loading latest.json ...</div>
<footer>Informational analysis only - not investment, legal, or financial advice. Levels are a judgement, not a forecast.</footer>
<script>
function bandColor(l){ return l<=2?'#2E7D32':l<=4?'#8BC34A':l<=6?'#F5A623':l<=8?'#E8710A':'#C0392B'; }
function bandName(l){ return l<=2?'Low':l<=4?'Moderate':l<=6?'Elevated':l<=8?'High':'Severe'; }
function meter(l){
  let s='<div class="meter">';
  for(let i=1;i<=10;i++) s += `<div class="seg" style="background:${i<=l?bandColor(l):'#e2e2e2'}"></div>`;
  return s+'</div>';
}
function sparkSVG(arr, color){
  if(!arr||arr.length<2) return '';
  const w=92,h=24,pad=2,mn=1,mx=10;
  const x=i=>pad+i*(w-2*pad)/(arr.length-1);
  const y=v=>h-pad-(v-mn)*(h-2*pad)/(mx-mn);
  const pts=arr.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const lx=x(arr.length-1).toFixed(1), ly=y(arr[arr.length-1]).toFixed(1);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"
      stroke-linecap="round" points="${pts}"/>
    <circle cx="${lx}" cy="${ly}" r="2.1" fill="${color}"/></svg>`;
}
function trendBadge(t){
  if(!t) return '<span class="trend" style="color:#bbb">new</span>';
  const c=t.change;
  if(c>0) return `<span class="trend" style="color:#C0392B">&#9650; +${c}</span>`;
  if(c<0) return `<span class="trend" style="color:#2E7D32">&#9660; ${c}</span>`;
  return '<span class="trend" style="color:#9a9a9a">&#9679; flat</span>';
}
function healthBar(d){
  const h=d.data_health; if(!h) return '';
  const okPct = h.live_total? h.live_ok/h.live_total : 1;
  const dot = h.offline? '#9a9a9a' : (okPct>=0.8? '#2E7D32' : okPct>=0.5? '#F5A623' : '#C0392B');
  const feeds = h.offline? '<b>offline preview</b> (sample data)'
    : `<b>${h.live_ok}/${h.live_total}</b> live feeds OK${h.fell_back? `, <b>${h.fell_back}</b> on baseline`:''}`;
  const agent = h.agent_last
    ? `agent last ran <b>${h.agent_days_ago}d ago</b> (${h.agent_last})${h.agent_flags? `, <b>${h.agent_flags}</b> flagged`:''}`
    : 'agent has not run yet';
  let ot='';
  if(d.aggregates_trend&&d.aggregates_trend.overall){ ot = `overall ${trendBadge(d.aggregates_trend.overall)} vs ${d.aggregates_trend.overall.since}`; }
  return `<div class="health"><span><span class="dot" style="background:${dot}"></span>${feeds}</span>
    <span>${agent}</span>${ot?`<span>${ot}</span>`:''}</div>`;
}
function fmt(v){ if(v===null||v===undefined) return '-'; return (typeof v==='number')? (Math.abs(v)<10? v.toFixed(2): v.toFixed(1)) : v; }
function confColor(c){ c=(c||'').toLowerCase(); return c==='high'?'#2E7D32':c==='medium'?'#F5A623':c==='error'?'#C0392B':'#888'; }
function statusOf(i){ const n=(i.note||'').toLowerCase();
  if(n.includes('override')) return 'overridden'; if(i.applied) return 'applied'; return 'held'; }
function reviewRows(arr){ return arr.map(i=>{
  const src=(i.sources||[]).map(u=>`<a href="${u}" target="_blank" rel="noopener">src</a>`).join(' ');
  return `<tr>
    <td>${i.label}<div style="color:#999;font-size:11px">${i.story}</div></td>
    <td>${fmt(i.value)}</td>
    <td><span class="pill" style="background:${confColor(i.confidence)};text-transform:capitalize">${i.confidence||'-'}</span></td>
    <td>${statusOf(i)}</td>
    <td>${i.rationale||''} ${src}</td></tr>`;
}).join(''); }
function reviewPanel(d){
  const r=d.agent_review;
  if(!r||!r.items||!r.items.length){
    return `<div class="narr"><strong>Agent review</strong>\nThe rating agent has not run yet \u2014 it will populate here after its first run (it runs weekly, or on demand from the Actions tab).</div>`;
  }
  const flags=new Set(r.review_flags||[]);
  const flagged=r.items.filter(i=>flags.has(i.id));
  const head=`<thead><tr><th>Indicator</th><th>Value</th><th>Confidence</th><th>Status</th><th>Why / sources</th></tr></thead>`;
  const gen=r.generated? new Date(r.generated).toLocaleString(): 'n/a';
  const flaggedTbl = flagged.length
    ? `<table>${head}<tbody>${reviewRows(flagged)}</tbody></table>`
    : `<div class="band" style="padding:6px 0">Nothing flagged \u2014 all ratings were confident and unchanged. \u2705</div>`;
  return `<div class="panel" id="review">
    <div class="phead" onclick="this.parentNode.classList.toggle('open')">
      <span><strong>Agent review</strong> <span class="band">your weekly 2-minute check</span></span>
      <span class="band"><b>${flagged.length}</b> flagged \u00B7 updated ${gen}${r.model?' \u00B7 '+r.model:''} <span class="chev"></span></span>
    </div>
    <div class="pbody">
      <div class="band" style="margin:8px 0 4px">Needs a glance (low-confidence or changed since last run):</div>
      ${flaggedTbl}
      <details style="margin-top:12px"><summary class="band">Show all ${r.items.length} agent-rated indicators</summary>
        <table style="margin-top:8px">${head}<tbody>${reviewRows(r.items)}</tbody></table>
      </details>
      <div class="band" style="margin-top:10px">To override any rating: edit <code>manual_input.csv</code> (put a number in <code>value</code>) and commit. Full reasoning log: <code>data/agent_assessments.json</code>.</div>
    </div>
  </div>`;
}
function render(d){
  document.getElementById('sub').textContent = `As of ${d.date}  -  generated ${d.generated_at}`;
  const a=d.aggregates;
  let html = `<div class="agg">
    <div class="card"><div class="lbl">Overall</div><div class="num" style="color:${bandColor(Math.round(a.overall))}">${a.overall}/10</div><div class="band">${bandName(Math.round(a.overall))}</div></div>
    <div class="card"><div class="lbl">Set 1</div><div class="num" style="color:${bandColor(Math.round(a['1']))}">${a['1']}/10</div></div>
    <div class="card"><div class="lbl">Set 2</div><div class="num" style="color:${bandColor(Math.round(a['2']))}">${a['2']}/10</div></div>
    <div class="card"><div class="lbl">Set 3</div><div class="num" style="color:${bandColor(Math.round(a['3']))}">${a['3']}/10</div></div>
  </div>`;
  html += healthBar(d);
  html += `<div class="narr"><strong>Daily brief</strong>\n${d.narrative||''}</div>`;
  html += reviewPanel(d);
  const sorted=[...d.stories].sort((x,y)=>y.level-x.level);
  for(const s of sorted){
    const col=bandColor(s.level);
    html += `<div class="story"><h3>${s.name} <span class="band">(Set ${s.set})</span></h3>
      <div class="row">${meter(s.level)}
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="lvl" style="color:${col}">${s.level}/10</span>
          <span class="band">${s.band}</span>
          ${trendBadge(s.trend)}<span class="asof">vs ${s.trend?s.trend.since:'\u2014'}</span>
          ${sparkSVG(s.spark,col)}
        </div></div>
      <table><thead><tr><th>Indicator</th><th>Value</th><th>Band</th><th>&Delta;</th><th>Cadence</th><th>As of</th><th>Source</th></tr></thead><tbody>`;
    for(const ind of s.indicators){
      const bc = ind.band===null? '#999' : bandColor(ind.band<=0?1:ind.band===1?5:9);
      const srcCell = ind.source_url
        ? `<a href="${ind.source_url}" target="_blank" rel="noopener">${ind.provenance||'src'}</a>`
        : (ind.provenance||ind.source);
      html += `<tr class="${ind.stale?'stale':''}">
        <td>${ind.label}</td><td>${fmt(ind.value)}</td>
        <td><span class="pill" style="background:${bc}">${ind.band===null?'-':ind.band}</span></td>
        <td>${ind.delta>0?'+':''}${ind.delta||0}</td>
        <td>${ind.cadence}</td>
        <td class="asof">${ind.as_of||'\u2014'}</td>
        <td style="color:#888">${srcCell}${ind.stale?' <span class="prov">baseline</span>':''}</td></tr>`;
    }
    html += `</tbody></table></div>`;
  }
  document.getElementById('app').innerHTML = html;
}
fetch('./latest.json?_='+Date.now())
  .then(r=>{ if(!r.ok) throw new Error('latest.json not found ('+r.status+')'); return r.json(); })
  .then(render)
  .catch(e=>{ document.getElementById('app').innerHTML =
    `<div class="err"><strong>Could not load data.</strong><br>${e.message}<br><br>
     Run <code>python src/main.py --offline --no-ai</code> first, then open this page from a local server
     (e.g. <code>python -m http.server</code> inside the <code>dashboard/</code> folder), or deploy via GitHub Pages.</div>`; });
</script>
</body>
</html>
