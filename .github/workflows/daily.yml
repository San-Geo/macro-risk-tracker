name: daily-risk-tracker

# Runs every weekday at 13:00 UTC (before US market open). Adjust as you like.
# You can also trigger it manually from the Actions tab.
on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tracker (live data + AI narrative)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python src/main.py || python src/main.py --offline --no-ai

      - name: Commit updated data
        run: |
          git config user.name  "risk-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ dashboard/ output/ || true
          git commit -m "EOD update $(date -u +%F)" || echo "no changes"
          git push || echo "nothing to push"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
