name: daily-risk-tracker

# Two cadences:
#   * every weekday  -> refresh live market data + narrative (free; reuses last agent ratings)
#   * every Monday   -> ALSO run the AI rating agent (researches each judgment indicator)
# Manual runs from the Actions tab are FREE by default (data refresh + redeploy only);
# tick the "run_agent" box to also run the AI agent (uses API credits).
on:
  schedule:
    - cron: "0 12 * * 1-5"    # 12:00 UTC weekdays (pre-US-open) - market refresh
    - cron: "0 12 * * 1"      # 12:00 UTC Monday (pre-open) - agent refresh (captures the weekend)
  workflow_dispatch:
    inputs:
      run_agent:
        description: "Run the AI rating agent (uses API credits). Leave unchecked to only refresh data + redeploy the site - no agent, no API cost."
        type: boolean
        default: false

# Only one run at a time; a new run supersedes a stuck one.
concurrency:
  group: tracker
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Decide whether to run the agent
        id: mode
        run: |
          if [ "${{ github.event.inputs.run_agent }}" = "true" ] || [ "${{ github.event.schedule }}" = "0 12 * * 1" ]; then
            echo "flag=--agent" >> "$GITHUB_OUTPUT"
            echo "Agent: ON for this run (you ticked run_agent, or it's the Monday schedule)"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "Agent: OFF - market refresh + redeploy only, no API cost"
          fi

      - name: Config self-test (guard)
        run: python tests/selftest.py

      - name: Run tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # optional: free key from fred.stlouisfed.org makes FRED feeds reliable from CI
          AGENT_MODEL: ${{ vars.AGENT_MODEL || 'claude-sonnet-4-6' }}
          AGENT_CONCURRENCY: ${{ vars.AGENT_CONCURRENCY || '4' }}
          AGENT_MODEL_2: ${{ vars.AGENT_MODEL_2 || secrets.AGENT_MODEL_2 }}   # 'asi1' for independent cross-check; works as a variable OR a secret
          ASI1_API_KEY: ${{ secrets.ASI1_API_KEY }}           # required only if AGENT_MODEL_2 starts with 'asi1'
          SCOUT_MODEL: ${{ vars.SCOUT_MODEL || 'claude-sonnet-4-6' }}
          # Optional alert channels (set as repo secrets; any/all/none):
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_MIN_LEVEL: ${{ vars.ALERT_MIN_LEVEL || '0' }}
        run: |
          if [ "${{ steps.mode.outputs.flag }}" = "--agent" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not set - the agent cannot research events; levels will stay at last ratings."
          fi
          python src/main.py ${{ steps.mode.outputs.flag }} --scout \
            || { echo "::warning::Primary run failed; falling back to offline (baseline) mode."; python src/main.py --offline --no-ai --no-alert; }

      - name: Commit updated data
        run: |
          git config user.name  "risk-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ dashboard/ output/ || true
          if git diff --cached --quiet; then
            echo "No file changes this run."
          else
            git commit -m "update $(date -u +%F)"
            git push && echo "Pushed updated data to the repo." \
              || echo "::error::git push FAILED - check Settings > Actions > Workflow permissions (needs Read and write)."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
